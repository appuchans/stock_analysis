services:
  app:
    build: .
    container_name: stock-analysis-app
    environment:
      - PYTHONPATH=/app/src
      - PYTHONUNBUFFERED=1
      # Point at the sibling services, not localhost
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://stock_analysis:stock_analysis_password@db:5432/stock_analysis
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
      - ./logs:/app/logs
    depends_on:
      - redis
      - db
    command: ["python", "-m", "stock_analysis.main", "--help"]
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: stock-analysis-redis
    volumes:
      - redis_data:/data
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: stock-analysis-db
    environment:
      - POSTGRES_DB=stock_analysis
      - POSTGRES_USER=stock_analysis
      - POSTGRES_PASSWORD=stock_analysis_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:
