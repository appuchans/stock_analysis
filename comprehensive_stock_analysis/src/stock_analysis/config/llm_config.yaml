# Central LLM configuration for all agents and crews.
#
# Priority chain (highest wins):
#   constructor args  >  agents.yaml llm_config block  >  this file per-agent
#   >  environment variables  >  this file global defaults
#
# Environment variable overrides (global):
#   LLM_PROVIDER      — e.g. openai | anthropic | ollama | azure | groq | mistral
#   LLM_MODEL         — e.g. gpt-4o | claude-sonnet-4-6 | llama3
#   LLM_TEMPERATURE   — float 0-1
#   LLM_MAX_TOKENS    — integer
#   EMBEDDER_PROVIDER — e.g. openai | azure | ollama
#   EMBEDDER_MODEL    — e.g. text-embedding-3-small

# ── Global defaults ────────────────────────────────────────────────────────────
global:
  provider: openai
  model: gpt-4o
  temperature: 0.1
  max_tokens: 4000

# ── Per-agent overrides ────────────────────────────────────────────────────────
# Set only the values that differ from the global defaults above.
# Recognised keys: provider, model, temperature, max_tokens
#
# Examples:
#   data_collector:
#     model: gpt-4o-mini        # cheaper model for data-fetching tasks
#
#   investment_advisor:
#     temperature: 0.0          # deterministic output for financial advice
#
#   technical_analyst:
#     provider: anthropic
#     model: claude-haiku-4-5-20251001
agents: {}

# ── Embedder configuration (used for Crew-level memory) ───────────────────────
embedder:
  provider: openai
  model: text-embedding-3-small

# ── Provider → LiteLLM model-string prefix mapping ────────────────────────────
# LiteLLM expects  "<prefix><model-name>"  e.g. "openai/gpt-4o".
# Add new providers here without changing any Python code.
provider_prefixes:
  openai: "openai/"
  anthropic: "anthropic/"
  ollama: "ollama/"
  azure: "azure/"
  groq: "groq/"
  mistral: "mistral/"
  cohere: "cohere/"
  bedrock: "bedrock/"
  huggingface: "huggingface/"
  vertexai: "vertexai/"
