# Flow configurations for comprehensive stock analysis

stock_analysis_flow:
  name: "Comprehensive Stock Analysis Flow"
  description: "A comprehensive flow for analyzing stocks using multiple specialized agents"
  
  # Flow structure
  structure:
    type: "sequential_with_parallel"
    phases:
      - name: "data_collection_phase"
        type: "parallel"
        tasks: ["data_collection"]
        max_concurrent: 1
        
      - name: "analysis_phase"
        type: "parallel"
        tasks: [
          "technical_analysis",
          "fundamental_analysis", 
          "risk_analysis",
          "sentiment_analysis",
          "market_analysis",
          "industry_analysis",
          "competitor_analysis",
          "economic_analysis"
        ]
        max_concurrent: 4
        depends_on: ["data_collection_phase"]
        
      - name: "synthesis_phase"
        type: "sequential"
        tasks: ["investment_recommendation"]
        depends_on: ["analysis_phase"]
        
      - name: "reporting_phase"
        type: "sequential"
        tasks: ["report_generation"]
        depends_on: ["synthesis_phase"]

  # Flow execution settings
  execution:
    max_iterations: 3
    timeout: 3600  # 1 hour
    retry_on_failure: true
    max_retries: 2
    continue_on_error: false
    
  # Memory and context management
  memory:
    enabled: true
    type: "persistent"
    max_context_length: 10000
    
  # Human input points
  human_input:
    enabled: true
    checkpoints:
      - after: "investment_recommendation"
        prompt: "Review the investment recommendation and provide feedback"
        required: false
      - after: "report_generation"
        prompt: "Review the final report and approve for delivery"
        required: true

# Alternative flow for quick analysis
quick_analysis_flow:
  name: "Quick Stock Analysis Flow"
  description: "A streamlined flow for quick stock analysis"
  
  structure:
    type: "sequential"
    phases:
      - name: "data_collection_phase"
        type: "parallel"
        tasks: ["data_collection"]
        max_concurrent: 1
        
      - name: "core_analysis_phase"
        type: "parallel"
        tasks: [
          "technical_analysis",
          "fundamental_analysis",
          "risk_analysis"
        ]
        max_concurrent: 3
        depends_on: ["data_collection_phase"]
        
      - name: "recommendation_phase"
        type: "sequential"
        tasks: ["investment_recommendation"]
        depends_on: ["core_analysis_phase"]

  execution:
    max_iterations: 2
    timeout: 1800  # 30 minutes
    retry_on_failure: true
    max_retries: 1
    continue_on_error: true

# Deep dive analysis flow
deep_dive_flow:
  name: "Deep Dive Stock Analysis Flow"
  description: "An exhaustive flow for comprehensive stock analysis with multiple validation steps"
  
  structure:
    type: "sequential_with_validation"
    phases:
      - name: "data_collection_phase"
        type: "parallel"
        tasks: ["data_collection"]
        max_concurrent: 1
        validation:
          enabled: true
          criteria: ["data_completeness", "data_quality"]
          
      - name: "primary_analysis_phase"
        type: "parallel"
        tasks: [
          "technical_analysis",
          "fundamental_analysis",
          "risk_analysis",
          "sentiment_analysis"
        ]
        max_concurrent: 4
        depends_on: ["data_collection_phase"]
        validation:
          enabled: true
          criteria: ["analysis_completeness", "consistency_check"]
          
      - name: "secondary_analysis_phase"
        type: "parallel"
        tasks: [
          "market_analysis",
          "industry_analysis",
          "competitor_analysis",
          "economic_analysis"
        ]
        max_concurrent: 4
        depends_on: ["primary_analysis_phase"]
        
      - name: "validation_phase"
        type: "sequential"
        tasks: ["cross_validation"]
        depends_on: ["secondary_analysis_phase"]
        
      - name: "synthesis_phase"
        type: "sequential"
        tasks: ["investment_recommendation"]
        depends_on: ["validation_phase"]
        
      - name: "reporting_phase"
        type: "sequential"
        tasks: ["report_generation"]
        depends_on: ["synthesis_phase"]

  execution:
    max_iterations: 5
    timeout: 7200  # 2 hours
    retry_on_failure: true
    max_retries: 3
    continue_on_error: false

# Batch analysis flow
batch_analysis_flow:
  name: "Batch Stock Analysis Flow"
  description: "A flow optimized for analyzing multiple stocks efficiently"
  
  structure:
    type: "parallel_with_queuing"
    phases:
      - name: "data_collection_phase"
        type: "parallel"
        tasks: ["data_collection"]
        max_concurrent: 3
        queue_size: 10
        
      - name: "analysis_phase"
        type: "parallel"
        tasks: [
          "technical_analysis",
          "fundamental_analysis",
          "risk_analysis",
          "sentiment_analysis"
        ]
        max_concurrent: 8
        depends_on: ["data_collection_phase"]
        
      - name: "synthesis_phase"
        type: "parallel"
        tasks: ["investment_recommendation"]
        max_concurrent: 4
        depends_on: ["analysis_phase"]
        
      - name: "reporting_phase"
        type: "parallel"
        tasks: ["report_generation"]
        max_concurrent: 2
        depends_on: ["synthesis_phase"]

  execution:
    max_iterations: 2
    timeout: 5400  # 1.5 hours
    retry_on_failure: true
    max_retries: 1
    continue_on_error: true
    batch_size: 5

# Real-time monitoring flow
monitoring_flow:
  name: "Real-time Stock Monitoring Flow"
  description: "A flow for continuous monitoring and alerting on stock changes"
  
  structure:
    type: "continuous"
    phases:
      - name: "data_update_phase"
        type: "scheduled"
        tasks: ["data_collection"]
        schedule: "*/15 * * * *"  # Every 15 minutes
        max_concurrent: 1
        
      - name: "analysis_phase"
        type: "conditional"
        tasks: ["technical_analysis", "sentiment_analysis"]
        condition: "significant_change_detected"
        max_concurrent: 2
        
      - name: "alert_phase"
        type: "conditional"
        tasks: ["alert_generation"]
        condition: "alert_conditions_met"
        max_concurrent: 1

  execution:
    max_iterations: -1  # Infinite
    timeout: 300  # 5 minutes per iteration
    retry_on_failure: true
    max_retries: 2
    continue_on_error: true
