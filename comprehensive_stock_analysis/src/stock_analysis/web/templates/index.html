<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Equity Lens — Stock Analysis</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" href="/static/css/app.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">◆</span>
      <span class="brand-name">Equity&nbsp;Lens</span>
      <span class="brand-sub">Multi-agent equity research</span>
    </div>
    <nav class="nav">
      <a href="#/new" data-nav="new" class="nav-link">New Analysis</a>
      <a href="#/history" data-nav="history" class="nav-link">History</a>
    </nav>
  </header>

  <main class="container">
    <!-- New Analysis -->
    <section id="view-new" class="view">
      <div class="card form-card">
        <h1 class="view-title">Analyze a stock or ETF</h1>
        <p class="muted">Enter a ticker and run a multi-agent analysis. Reports are cached for 24h.</p>
        <form id="analyze-form" class="analyze-form" autocomplete="off">
          <div class="field field-symbol">
            <label for="symbol">Ticker</label>
            <input id="symbol" name="symbol" type="text" placeholder="AAPL" maxlength="10" required />
          </div>
          <div class="field">
            <label for="depth">Depth</label>
            <select id="depth" name="depth">
              <option value="quick">Quick — fundamentals</option>
              <option value="standard" selected>Standard — + risk, sentiment, ownership</option>
              <option value="deep">Deep — all specialists</option>
            </select>
          </div>
          <div class="field">
            <label for="asset_type">Asset</label>
            <select id="asset_type" name="asset_type">
              <option value="auto" selected>Auto-detect</option>
              <option value="stock">Stock</option>
              <option value="etf">ETF</option>
            </select>
          </div>
          <label class="check"><input id="use_cache" type="checkbox" checked /> Use cached data (≤24h)</label>
          <button id="run-btn" type="submit" class="btn btn-primary">Run analysis</button>
        </form>
      </div>

      <div id="progress-card" class="card progress-card hidden">
        <div class="progress-head">
          <span id="progress-symbol" class="progress-symbol"></span>
          <span id="progress-stage" class="progress-stage"></span>
        </div>
        <div class="progress-track"><div id="progress-bar" class="progress-bar"></div></div>
        <div class="progress-meta">
          <span id="progress-pct">0%</span>
          <span id="progress-tokens" class="muted">0 tokens</span>
          <span id="progress-calls" class="muted">0 LLM calls</span>
        </div>
        <div id="progress-error" class="error-banner hidden"></div>
      </div>
    </section>

    <!-- Report (dashboard + embedded HTML) -->
    <section id="view-report" class="view">
      <div class="report-head">
        <button class="btn btn-ghost" data-back>← Back</button>
        <h1 id="report-title" class="view-title"></h1>
        <div class="tabs">
          <button class="tab is-active" data-tab="overview">Overview</button>
          <button class="tab" data-tab="full">Full Report</button>
        </div>
      </div>
      <div id="tab-overview" class="tab-panel">
        <div id="dashboard"></div>
      </div>
      <div id="tab-full" class="tab-panel hidden">
        <iframe id="report-frame" class="report-frame" title="Full report"></iframe>
      </div>
    </section>

    <!-- History -->
    <section id="view-history" class="view">
      <div class="history-head">
        <h1 class="view-title">Past analyses</h1>
        <input id="history-filter" type="search" placeholder="Filter by symbol or sector…" class="filter-input" />
      </div>
      <div id="history-grid" class="history-grid"></div>
      <p id="history-empty" class="muted hidden">No reports yet. Run an analysis to get started.</p>
    </section>
  </main>

  <script type="module" src="/static/js/app.js"></script>
</body>
</html>
