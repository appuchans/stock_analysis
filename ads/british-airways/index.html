<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>British Airways — To Fly. To Serve.</title>
<style>
  :root {
    --ba-navy: #075aaa;
    --ba-navy-dark: #12121f;
    --ba-red: #ee1c25;
    --ba-white: #ffffff;
  }
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: var(--ba-navy-dark);
    overflow: hidden;
    font-family: "Helvetica Neue", Arial, sans-serif;
  }
  #scene {
    position: fixed;
    inset: 0;
  }
  #scene canvas {
    display: block;
  }
  .overlay {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    text-align: center;
    color: var(--ba-white);
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 14px;
    opacity: 0;
    transform: translateY(16px);
    animation: fadeUp 1s ease-out 0.4s forwards;
  }
  .brand .mark {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: conic-gradient(var(--ba-red) 0deg 180deg, var(--ba-navy) 180deg 360deg);
    box-shadow: 0 0 18px rgba(238, 28, 37, 0.6);
  }
  .brand .wordmark {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .tagline {
    margin-top: 18px;
    font-size: 46px;
    font-weight: 300;
    letter-spacing: 1px;
    opacity: 0;
    transform: translateY(16px);
    animation: fadeUp 1s ease-out 1s forwards;
  }
  .tagline strong {
    font-weight: 700;
    color: var(--ba-red);
  }
  .subtext {
    margin-top: 10px;
    font-size: 18px;
    font-weight: 300;
    color: rgba(255, 255, 255, 0.75);
    letter-spacing: 0.5px;
    opacity: 0;
    transform: translateY(16px);
    animation: fadeUp 1s ease-out 1.5s forwards;
  }
  .cta {
    margin-top: 34px;
    pointer-events: auto;
    padding: 14px 38px;
    border-radius: 999px;
    border: none;
    background: var(--ba-red);
    color: var(--ba-white);
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(238, 28, 37, 0.35);
    opacity: 0;
    transform: translateY(16px);
    animation: fadeUp 1s ease-out 2s forwards;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  .cta:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 30px rgba(238, 28, 37, 0.5);
  }
  @keyframes fadeUp {
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
  .fineprint {
    position: fixed;
    bottom: 18px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 11px;
    letter-spacing: 0.5px;
    color: rgba(255, 255, 255, 0.35);
    pointer-events: none;
  }
</style>
</head>
<body>
  <div id="scene"></div>

  <div class="overlay">
    <div class="brand">
      <div class="mark"></div>
      <div class="wordmark">British Airways</div>
    </div>
    <div class="tagline">To Fly. <strong>To Serve.</strong></div>
    <div class="subtext">The world's favourite airline — reimagined for the sky ahead.</div>
    <button class="cta">Book Your Flight</button>
  </div>

  <div class="fineprint">Concept demo · built with three.js</div>

  <script src="vendor/three.min.js"></script>
  <script>
    const container = document.getElementById('scene');

    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x12121f, 0.035);

    const camera = new THREE.PerspectiveCamera(
      50, window.innerWidth / window.innerHeight, 0.1, 1000
    );
    camera.position.set(0, 1.5, 11);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x12121f, 1);
    container.appendChild(renderer.domElement);

    // Lighting
    scene.add(new THREE.AmbientLight(0x3b4a6b, 1.1));
    const keyLight = new THREE.DirectionalLight(0xffffff, 1.4);
    keyLight.position.set(5, 6, 4);
    scene.add(keyLight);
    const rimLight = new THREE.DirectionalLight(0xee1c25, 0.6);
    rimLight.position.set(-6, -2, -4);
    scene.add(rimLight);

    // Starfield
    const starGeo = new THREE.BufferGeometry();
    const starCount = 1400;
    const starPositions = new Float32Array(starCount * 3);
    for (let i = 0; i < starCount; i++) {
      const radius = 40 + Math.random() * 60;
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);
      starPositions[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
      starPositions[i * 3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
      starPositions[i * 3 + 2] = radius * Math.cos(phi);
    }
    starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
    const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.09, sizeAttenuation: true });
    scene.add(new THREE.Points(starGeo, starMat));

    // Wireframe globe (global route network)
    const globeGroup = new THREE.Group();
    const globe = new THREE.Mesh(
      new THREE.IcosahedronGeometry(3.1, 3),
      new THREE.MeshBasicMaterial({ color: 0x075aaa, wireframe: true, transparent: true, opacity: 0.35 })
    );
    globeGroup.add(globe);
    const globeCore = new THREE.Mesh(
      new THREE.SphereGeometry(2.85, 32, 32),
      new THREE.MeshPhongMaterial({ color: 0x0a1a33, shininess: 40, transparent: true, opacity: 0.85 })
    );
    globeGroup.add(globeCore);
    scene.add(globeGroup);

    // Low-poly airplane
    function buildPlane() {
      const plane = new THREE.Group();
      const bodyMat = new THREE.MeshPhongMaterial({ color: 0xffffff, shininess: 80 });
      const accentMat = new THREE.MeshPhongMaterial({ color: 0xee1c25, shininess: 60 });
      const wingMat = new THREE.MeshPhongMaterial({ color: 0x075aaa, shininess: 50 });

      const fuselage = new THREE.Mesh(new THREE.CapsuleGeometry(0.14, 1.1, 4, 8), bodyMat);
      fuselage.rotation.z = Math.PI / 2;
      plane.add(fuselage);

      const nose = new THREE.Mesh(new THREE.ConeGeometry(0.14, 0.4, 8), accentMat);
      nose.rotation.z = -Math.PI / 2;
      nose.position.x = 0.75;
      plane.add(nose);

      const wing = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.04, 1.5), wingMat);
      wing.position.set(-0.05, -0.02, 0);
      plane.add(wing);

      const tailWing = new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.04, 0.6), wingMat);
      tailWing.position.set(-0.55, 0, 0);
      plane.add(tailWing);

      const fin = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.35, 0.04), accentMat);
      fin.position.set(-0.55, 0.2, 0);
      plane.add(fin);

      plane.scale.setScalar(1.15);
      return plane;
    }

    const plane = buildPlane();
    scene.add(plane);

    // Contrail
    const trailPoints = 60;
    const trailGeo = new THREE.BufferGeometry();
    const trailPositions = new Float32Array(trailPoints * 3);
    trailGeo.setAttribute('position', new THREE.BufferAttribute(trailPositions, 3));
    const trailMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.4 });
    const trail = new THREE.Line(trailGeo, trailMat);
    scene.add(trail);
    const trailHistory = [];

    const flightRadius = 4.6;
    const flightTilt = 0.35;

    function planePosition(t) {
      const x = Math.cos(t) * flightRadius;
      const z = Math.sin(t) * flightRadius;
      const y = Math.sin(t * 1.3) * flightTilt + 0.4;
      return new THREE.Vector3(x, y, z);
    }

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const elapsed = clock.getElapsedTime();

      globeGroup.rotation.y = elapsed * 0.08;

      const t = elapsed * 0.35;
      const pos = planePosition(t);
      const nextPos = planePosition(t + 0.01);
      plane.position.copy(pos);
      plane.lookAt(nextPos);

      trailHistory.unshift(pos.clone());
      if (trailHistory.length > trailPoints) trailHistory.pop();
      for (let i = 0; i < trailPoints; i++) {
        const p = trailHistory[i] || pos;
        trailPositions[i * 3] = p.x;
        trailPositions[i * 3 + 1] = p.y;
        trailPositions[i * 3 + 2] = p.z;
      }
      trailGeo.attributes.position.needsUpdate = true;

      camera.position.x = Math.sin(elapsed * 0.05) * 1.2;
      camera.lookAt(0, 0.3, 0);

      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    document.querySelector('.cta').addEventListener('click', () => {
      window.open('https://www.britishairways.com', '_blank', 'noopener');
    });
  </script>
</body>
</html>
